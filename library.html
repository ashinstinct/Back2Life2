<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Library — Back2Life.app</title>
<meta name="description" content="Your generated AI images and videos, all in one place.">
<link rel="icon" type="image/png" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --green:#00ff88;--green2:#00cc66;--text:#f0f0f0;--text2:#aaaaaa;--text3:#555555;
  --bar-h:60px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;min-height:100dvh}
.topbar{position:sticky;top:0;z-index:100;height:var(--bar-h);display:flex;align-items:center;padding:0 16px;background:rgba(8,8,8,0.92);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border)}
.topbar a.back{display:flex;align-items:center;justify-content:center;width:40px;height:40px;color:var(--text);text-decoration:none;font-size:22px}
.topbar .title{font-size:16px;font-weight:800;color:var(--green);margin-right:auto;margin-left:2px}
.badge{margin-left:auto;flex-shrink:0;display:none;align-items:center;gap:5px;background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.25);border-radius:999px;padding:5px 11px;cursor:pointer}
.badge span{color:var(--green);font-size:12.5px;font-weight:800}
main{max-width:640px;margin:0 auto;padding:20px 16px 60px}
h1{font-size:22px;font-weight:800;margin-bottom:4px}
.sub{font-size:13.5px;color:var(--text2);margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.card .media{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#111}
.card .meta{padding:10px 12px}
.card .model{font-size:11px;font-weight:700;color:var(--green);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:3px}
.card .prompt{font-size:11.5px;color:var(--text2);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.card .date{font-size:10.5px;color:var(--text3)}
.card a.dl{font-size:11px;font-weight:800;color:var(--green);text-decoration:none}
.empty{text-align:center;padding:70px 20px}
.empty .icon{font-size:44px;margin-bottom:14px}
.empty h2{font-size:18px;font-weight:800;margin-bottom:8px}
.empty p{font-size:13.5px;color:var(--text2);line-height:1.6;margin-bottom:22px}
.cta{display:inline-block;background:linear-gradient(135deg,var(--green2),var(--green));color:#000;font-size:14px;font-weight:800;padding:13px 26px;border-radius:12px;text-decoration:none}
.loading{text-align:center;color:var(--text3);font-size:13px;padding:60px 0}
</style>
</head>
<body>

<div class="topbar">
  <a class="back" href="/ai-studio" aria-label="Back to AI Studio">&#8249;</a>
  <div class="title">My Library</div>
  <div class="badge" id="creditsBadge" onclick="window.b2lShowCredits && window.b2lShowCredits()"><span>&#9889;</span><span id="creditsNum">0</span></div>
</div>

<main>
  <h1>Your Generations</h1>
  <div class="sub">Every image and video you create in AI Studio is saved here.</div>
  <div class="loading" id="loading">Loading your library&hellip;</div>
  <div class="grid" id="grid" style="display:none"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="icon">&#127916;</div>
    <h2>Nothing here yet</h2>
    <p>Fire up AI Studio and your generated images and videos will appear here automatically.</p>
    <a class="cta" href="/ai-studio">Open AI Studio</a>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/auth.js"></script>
<script src="/pricing.js"></script>
<script>
(async function(){
  var sb = window.b2lSupabase;
  var res = await sb.auth.getSession();
  var session = res && res.data ? res.data.session : null;
  if (!session) { window.location.href = '/login?next=/library'; return; }

  // Credits badge
  try {
    var meRes = await fetch('https://sfpokfgfycsqvhtpamgm.supabase.co/functions/v1/fal-proxy', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+session.access_token, 'apikey':'sb_publishable_T0QKdJAb6katQhGtA8gWZA_xxnA4r_A' },
      body: JSON.stringify({ action:'me' })
    });
    if (meRes.ok) {
      var me = await meRes.json();
      document.getElementById('creditsNum').textContent = (me.credits||0).toLocaleString();
      document.getElementById('creditsBadge').style.display = 'flex';
    }
  } catch(e) {}

  // Generations
  var q = await sb.from('generations')
    .select('id, kind, model, prompt, output_url, status, created_at')
    .eq('status','completed')
    .order('created_at', { ascending: false })
    .limit(100);

  document.getElementById('loading').style.display = 'none';
  var items = (q && q.data) ? q.data.filter(function(g){ return g.output_url; }) : [];
  if (!items.length) { document.getElementById('empty').style.display = 'block'; return; }

  var grid = document.getElementById('grid');
  grid.style.display = 'grid';
  items.forEach(function(g){
    var card = document.createElement('div');
    card.className = 'card';
    var mediaHtml = g.kind === 'video'
      ? '<video class="media" src="' + g.output_url + '" muted playsinline loop onclick="this.paused?this.play():this.pause()"></video>'
      : '<img class="media" src="' + g.output_url + '" loading="lazy" alt="">';
    var name = (g.model || '').split('/').slice(-2).join(' ').replace(/-/g,' ');
    var d = new Date(g.created_at);
    card.innerHTML = mediaHtml +
      '<div class="meta">' +
      '<div class="model">' + (g.kind === 'video' ? '\uD83C\uDFAC ' : '\uD83D\uDDBC ') + name + '</div>' +
      '<div class="prompt"></div>' +
      '<div class="row"><span class="date">' + d.toLocaleDateString() + '</span>' +
      '<a class="dl" href="' + g.output_url + '" target="_blank" rel="noopener" download>Download</a></div>' +
      '</div>';
    card.querySelector('.prompt').textContent = g.prompt || '';
    grid.appendChild(card);
  });
})();
</script>
<script defer src="/t.js"></script>
</body>
</html>
