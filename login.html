<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sign In — Back2Life.app</title>
<meta name="description" content="Sign in to Back2Life.app to unlock free AI video tutorials, prompts and storyboards.">
<link rel="icon" type="image/png" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
  --glass:rgba(16,16,16,0.88);--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.13);
  --green:#00ff88;--green2:#00cc66;--green-dim:rgba(0,255,136,0.08);
  --text:#f0f0f0;--text2:#aaaaaa;--text3:#555555;--red:#ff4444;
  --radius:18px;--radius-sm:12px;--pill:999px;--bar-h:60px;
  --transition:0.2s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;min-height:100dvh}
.topbar{position:sticky;top:0;z-index:100;height:var(--bar-h);display:flex;align-items:center;padding:0 16px;background:rgba(8,8,8,0.92);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border)}
.topbar a.back{display:flex;align-items:center;justify-content:center;width:40px;height:40px;color:var(--text);text-decoration:none;font-size:22px}
.topbar .title{font-size:16px;font-weight:800;color:var(--green);letter-spacing:0.5px;margin-right:auto;margin-left:2px}
.topbar .spacer{width:40px}
main{max-width:420px;margin:0 auto;padding:36px 20px 60px}
.logo{display:block;width:72px;height:72px;border-radius:18px;margin:0 auto 20px}
h1{font-size:24px;font-weight:800;text-align:center;margin-bottom:8px}
.sub{font-size:14.5px;color:var(--text2);text-align:center;line-height:1.6;margin-bottom:30px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:var(--transition)}
.btn-google{background:#fff;color:#111}
.btn-google:active{transform:scale(0.98)}
.btn-primary{background:linear-gradient(135deg,var(--green2),var(--green));color:#000;box-shadow:0 4px 20px rgba(0,255,136,0.2)}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{opacity:0.5}
.divider{display:flex;align-items:center;gap:14px;margin:22px 0;color:var(--text3);font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2)}
label{display:block;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin:0 0 8px}
input{width:100%;padding:14px 16px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Inter',sans-serif;font-size:16px;margin-bottom:16px;outline:none;transition:var(--transition)}
input:focus{border-color:var(--green)}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:52px}
.pass-toggle{position:absolute;top:0;right:0;height:calc(100% - 16px);width:48px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text2);cursor:pointer;padding:0}
.pass-toggle:active{color:var(--green)}
.msg{display:none;font-size:13.5px;line-height:1.5;padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:16px}
.msg.error{display:block;background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);color:#ff8888}
.msg.ok{display:block;background:var(--green-dim);border:1px solid rgba(0,255,136,0.3);color:var(--green)}
.toggle{margin-top:18px;text-align:center;font-size:13.5px;color:var(--text2)}
.toggle a{color:var(--green);text-decoration:none;font-weight:700;cursor:pointer}
.signed-in{display:none;text-align:center}
.signed-in .who{font-size:15px;color:var(--text);margin-bottom:20px;line-height:1.6}
.signed-in .who b{color:var(--green)}
.signout{margin-top:16px;background:none;border:none;color:var(--text3);font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline}
.privacy{margin-top:22px;text-align:center;font-size:12px;color:var(--text3);line-height:1.6}
</style>
</head>
<body>

<div class="topbar">
  <a class="back" href="/" aria-label="Back to home">&#8249;</a>
  <div class="title">Sign In</div>
  <div class="spacer"></div>
</div>

<main>
  <img class="logo" src="/apple-touch-icon.png" alt="Back2Life.app">
  <h1>Welcome to Back2Life</h1>
  <div class="sub">Create a free account to unlock all AI video tutorials, prompts and storyboards.</div>

  <div class="card">

    <div id="signedIn" class="signed-in">
      <div class="who">You're signed in as<br><b id="whoEmail"></b></div>
      <button class="btn btn-primary" id="continueBtn">Continue</button>
      <button class="signout" id="signOutBtn">Sign out</button>
    </div>

    <div id="authForms">
      <button class="btn btn-google" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 18.9 12 24 12c3.1 0 5.8 1.1 8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C41.4 35.4 44 30.1 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
        Continue with Google
      </button>

      <div class="divider">or with email</div>

      <div class="msg" id="msg"></div>

      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email" placeholder="you@example.com">

      <label for="password">Password</label>
      <div class="pass-wrap">
        <input type="password" id="password" autocomplete="current-password" placeholder="Minimum 6 characters">
        <button type="button" class="pass-toggle" id="passToggle" aria-label="Show password">
          <svg id="eyeOpen" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eyeClosed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>

      <button class="btn btn-primary" id="submitBtn">Sign In</button>

      <div class="toggle" id="toggleWrap">
        New here? <a id="toggleLink">Create a free account</a>
      </div>
    </div>

  </div>

  <div class="privacy">We only use your email for your account and Back2Life updates. No spam, unsubscribe anytime.</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/auth.js"></script>
<script>
(function(){
  var sb = window.b2lSupabase;
  var mode = 'signin'; // or 'signup'
  var params = new URLSearchParams(window.location.search);
  var next = params.get('next') || '/';
  if (!/^\/[a-zA-Z0-9\-_/#?=&]*$/.test(next)) next = '/';

  var msg = document.getElementById('msg');
  var emailEl = document.getElementById('email');
  var passEl = document.getElementById('password');
  var submitBtn = document.getElementById('submitBtn');
  var toggleLink = document.getElementById('toggleLink');
  var toggleWrap = document.getElementById('toggleWrap');

  function showMsg(text, type){ msg.textContent = text; msg.className = 'msg ' + type; }
  function clearMsg(){ msg.className = 'msg'; }

  function setMode(m){
    mode = m;
    clearMsg();
    if (m === 'signup') {
      submitBtn.textContent = 'Create Free Account';
      toggleWrap.innerHTML = 'Already have an account? <a id="toggleLink">Sign in</a>';
    } else {
      submitBtn.textContent = 'Sign In';
      toggleWrap.innerHTML = 'New here? <a id="toggleLink">Create a free account</a>';
    }
    document.getElementById('toggleLink').addEventListener('click', function(){
      setMode(mode === 'signin' ? 'signup' : 'signin');
    });
  }
  toggleLink.addEventListener('click', function(){ setMode('signup'); });

  /* Already signed in? */
  sb.auth.getSession().then(function(res){
    var session = res && res.data ? res.data.session : null;
    if (session) {
      document.getElementById('authForms').style.display = 'none';
      document.getElementById('signedIn').style.display = 'block';
      document.getElementById('whoEmail').textContent = session.user.email;
    }
  });
  document.getElementById('continueBtn').addEventListener('click', function(){ window.location.href = next; });
  document.getElementById('signOutBtn').addEventListener('click', function(){
    sb.auth.signOut().then(function(){ window.location.reload(); });
  });

  /* Google */
  document.getElementById('googleBtn').addEventListener('click', function(){
    clearMsg();
    sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + next }
    }).then(function(res){
      if (res.error) {
        showMsg(res.error.message.indexOf('not enabled') > -1
          ? 'Google sign-in is coming soon — please use email for now.'
          : res.error.message, 'error');
      }
    });
  });

  /* Email + password */
  submitBtn.addEventListener('click', function(){
    clearMsg();
    var email = emailEl.value.trim();
    var password = passEl.value;
    if (!email || email.indexOf('@') < 1) { showMsg('Please enter a valid email address.', 'error'); return; }
    if (!password || password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
    submitBtn.disabled = true;

    var done = function(){ submitBtn.disabled = false; };

    if (mode === 'signup') {
      sb.auth.signUp({ email: email, password: password }).then(function(res){
        done();
        if (res.error) { showMsg(res.error.message, 'error'); return; }
        if (res.data && res.data.session) {
          window.location.href = next;
        } else {
          showMsg('Check your email to confirm your account, then come back and sign in.', 'ok');
        }
      });
    } else {
      sb.auth.signInWithPassword({ email: email, password: password }).then(function(res){
        done();
        if (res.error) { showMsg(res.error.message, 'error'); return; }
        window.location.href = next;
      });
    }
  });

  passEl.addEventListener('keydown', function(e){ if (e.key === 'Enter') submitBtn.click(); });

  /* Show / hide password */
  var passToggle = document.getElementById('passToggle');
  var eyeOpen = document.getElementById('eyeOpen');
  var eyeClosed = document.getElementById('eyeClosed');
  passToggle.addEventListener('click', function(){
    var showing = passEl.type === 'text';
    passEl.type = showing ? 'password' : 'text';
    eyeOpen.style.display = showing ? 'block' : 'none';
    eyeClosed.style.display = showing ? 'none' : 'block';
    passToggle.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
  });
})();
</script>
</body>
</html>
