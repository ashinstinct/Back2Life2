.grad{background:linear-gradient(90deg,#22d3ee,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sheet{animation:slideUp 0.28s ease}
.fade{animation:fadeIn 0.2s ease}
button{cursor:pointer;font-family:inherit}
.skeleton{background:linear-gradient(90deg,#1e293b 25%,#233041 50%,#1e293b 75%);background-size:200% 100%;animation:skshimmer 1.5s ease-in-out infinite}
@keyframes skshimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.chart-fs{position:fixed!important;inset:0!important;z-index:450!important;border-radius:0!important;background:#0a0f1e!important}

function uid(){return Math.random().toString(36).substr(2,9);}
function timeAgo(ds){
  var d=Math.floor((Date.now()-new Date(ds))/1000);
  if(d<60)return d+'s ago';
  if(d<3600)return Math.floor(d/60)+'m ago';
  if(d<86400)return Math.floor(d/3600)+'h ago';

}

  /* Calculator Page - useRef pattern avoids stale closure crashes */
  function CalcPage(){
    /* Single state object — one setState = one re-render, no stale reads */
    var cs=useState({disp:'0',op:null,stored:null,fresh:false,expr:''});
    var S=cs[0];var setS=cs[1];

    function press(v){
      setS(function(s){
        var disp=s.disp,op=s.op,stored=s.stored,fresh=s.fresh,expr=s.expr;
        function fmt(n){return isNaN(n)?'0':String(Math.round(n*1e10)/1e10);}

        if(v==='C') return {disp:'0',op:null,stored:null,fresh:false,expr:''};
        if(v==='±') return Object.assign({},s,{disp:disp.charAt(0)==='-'?disp.slice(1):'-'+disp});
        if(v==='%') return Object.assign({},s,{disp:fmt(parseFloat(disp)/100)});
        if(v==='DEL') return Object.assign({},s,{disp:disp.length>1?disp.slice(0,-1):'0'});

        if(['+','-','×','÷'].includes(v)){
          var cur=parseFloat(disp)||0;
          /* Show running expression: "12 + " */
          if(op&&stored!==null&&!fresh){
            var r=op==='+'?stored+cur:op==='-'?stored-cur:op==='×'?stored*cur:cur!==0?stored/cur:0;
            var rr=Math.round(r*1e10)/1e10;
            return {disp:fmt(rr),op:v,stored:rr,fresh:true,expr:fmt(rr)+' '+v};
          }
          return {disp:fmt(cur),op:v,stored:cur,fresh:true,expr:fmt(cur)+' '+v};
        }

        if(v==='='){
          if(op&&stored!==null){
            var cur2=parseFloat(disp)||0;
            var res=op==='+'?stored+cur2:op==='-'?stored-cur2:op==='×'?stored*cur2:cur2!==0?stored/cur2:0;
            var rounded=Math.round(res*1e10)/1e10;
            return {disp:fmt(rounded),op:null,stored:null,fresh:false,expr:expr+' '+fmt(cur2)+' ='};
          }
          return s;
        }

        /* Digit or decimal */
        if(v==='.'&&disp.indexOf('.')!==-1&&!fresh) return s;
        var newDisp=(fresh||disp==='0')?(v==='.'?'0.':v):(disp+v);
        /* Update expression to show what user is typing: "12 + 34" */
        var newExpr=op?(fmt(stored)+' '+op+' '+newDisp):newDisp;
        return {disp:newDisp,op:op,stored:stored,fresh:false,expr:newExpr};
      });
    }

    var KEYS=[
      ['C','±','%','÷'],
      ['7','8','9','×'],
      ['4','5','6','-'],
      ['1','2','3','+'],
      ['DEL','0','.','=']
    ];
    var OPS=['+','-','×','÷'];
    var UTIL=['C','±','%','DEL'];

    var rawDisp=S.disp;
    var dispNum=parseFloat(rawDisp);
    var dispStr=isNaN(dispNum)?'0':
      (rawDisp.endsWith('.')?rawDisp:
       rawDisp.indexOf('.')!==-1?
